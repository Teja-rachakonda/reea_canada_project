# Render Blueprint — deploys the backend as a free web service.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# pre-fills everything below. You only paste OPENAI_API_KEY (marked sync:false,
# so it is never stored in git).
services:
  - type: web
    name: reea-canada-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "22.19.0"
